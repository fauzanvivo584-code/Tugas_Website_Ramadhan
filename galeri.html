<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galeri - Nadila Ramadani</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
<link rel="stylesheet" href="css/style.css">

<style>

/* GALERI GRID */
.gallery-wrapper {
    padding: 30px 0;
}

/* FILTER BUTTONS */
.filter-buttons {
    text-align: center;
    margin-bottom: 40px;
}

.filter-btn {
    background: #f0f0f0;
    border: none;
    padding: 10px 25px;
    margin: 0 8px;
    border-radius: 30px;
    font-size: 16px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.3s ease;
    color: #333;
}

.filter-btn:hover {
    background: #e0e0e0;
    transform: translateY(-2px);
}

.filter-btn.active {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
}

.gallery-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 25px;
}

/* CARD FOTO - Tanpa tulisan */
.card {
    background: white;
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    cursor: pointer;
    animation: fadeInUp 0.5s ease;
}

.card:hover {
    transform: translateY(-10px);
    box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
}

.card img {
    width: 100%;
    height: 300px;
    object-fit: cover;
    transition: transform 0.3s ease;
    display: block;
}

.card:hover img {
    transform: scale(1.05);
}

/* MODAL LIGHTBOX */
.modal {
    display: none;
    position: fixed;
    z-index: 1000;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0, 0, 0, 0.9);
    animation: fadeIn 0.3s ease;
}

.modal-content {
    position: relative;
    margin: auto;
    padding: 20px;
    width: 80%;
    max-width: 900px;
    top: 50%;
    transform: translateY(-50%);
}

.modal-img {
    width: 100%;
    height: auto;
    border-radius: 10px;
    animation: zoomIn 0.3s ease;
}

.close-modal {
    position: absolute;
    top: 20px;
    right: 35px;
    color: white;
    font-size: 40px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

.close-modal:hover {
    color: #ff6b6b;
}

.prev-btn, .next-btn {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(255,255,255,0.2);
    color: white;
    padding: 16px;
    cursor: pointer;
    border-radius: 50%;
    transition: 0.3s;
    font-size: 24px;
    border: none;
}

.prev-btn:hover, .next-btn:hover {
    background: rgba(255,255,255,0.4);
}

.prev-btn {
    left: 20px;
}

.next-btn {
    right: 20px;
}

/* ANIMATIONS */
@keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

@keyframes zoomIn {
    from {
        opacity: 0;
        transform: scale(0.8);
    }
    to {
        opacity: 1;
        transform: scale(1);
    }
}

/* RESPONSIVE */
@media (max-width: 900px) {
    .gallery-grid {
        grid-template-columns: repeat(2, 1fr);
    }
    
    .filter-btn {
        padding: 8px 18px;
        margin: 0 5px;
        font-size: 14px;
    }
    
    .card img {
        height: 250px;
    }
}

@media (max-width: 600px) {
    .gallery-grid {
        grid-template-columns: 1fr;
    }
    
    .filter-buttons {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 10px;
    }
    
    .filter-btn {
        margin: 0;
    }
    
    .prev-btn, .next-btn {
        padding: 12px;
        font-size: 18px;
    }
    
    .card img {
        height: 280px;
    }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
    <div class="container">
        <a href="index.html" class="logo">
            <i class="bi bi-moon-stars-fill"></i>
            Nadila Ramadani
        </a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
        </ul>
    </div>
</nav>

<!-- HEADER -->
<div class="page-header">
    <div class="container">
        <h1>Galeri Lebaran 2026</h1>
        <p>Foto-foto momen indah selama hari raya</p>
    </div>
</div>

<!-- GALERI -->
<section class="container">
    <div class="gallery-wrapper">
        
        <!-- Filter Buttons -->
        <div class="filter-buttons">
            <button class="filter-btn active" data-filter="all">Semua</button>
            <button class="filter-btn" data-filter="selfie">Foto Sendiri</button>
            <button class="filter-btn" data-filter="friend">Bersama Teman</button>
            <button class="filter-btn" data-filter="family">Bersama Keluarga</button>
        </div>

        <!-- Gallery Grid - Hanya Foto, Tanpa Tulisan -->
        <div class="gallery-grid" id="galleryGrid">
            
            <!-- FOTO (SELFIE) - 4 Foto -->
            <div class="card" data-category="selfie">
                <img src="img/foto1.jpeg" alt="Foto Sendiri 1">
            </div>

            <div class="card" data-category="selfie">
                <img src="img/foto2.jpeg" alt="Foto Sendiri 2">
            </div>

            <div class="card" data-category="selfie">
                <img src="img/foto3.jpeg" alt="Foto Sendiri 3">
            </div>

            <!-- FOTO BERSAMA TEMAN - 3 Foto -->
            <div class="card" data-category="friend">
                <img src="img/glery1.jpeg" alt="Bersama Teman 1">
            </div>

            <div class="card" data-category="friend">
                <img src="img/glery2.jpeg" alt="Bersama Teman 2">
            </div>

            <div class="card" data-category="friend">
                <img src="img/glery3.jpeg" alt="Bersama Teman 3">
            </div>
            <!-- FOTO BERSAMA KELUARGA - 3 Foto -->
            <div class="card" data-category="family">
                <img src="img/fotoo1.jpeg" alt="Bersama Keluarga 1">
            </div>

            <div class="card" data-category="family">
                <img src="img/fotoo2.jpeg" alt="Bersama Keluarga 2">
            </div>
        </div>
    </div>
</section>

<!-- MODAL LIGHTBOX -->
<div id="imageModal" class="modal">
    <span class="close-modal">&times;</span>
    <button class="prev-btn"><i class="bi bi-chevron-left"></i></button>
    <button class="next-btn"><i class="bi bi-chevron-right"></i></button>
    <div class="modal-content">
        <img class="modal-img" id="modalImage" src="" alt="">
    </div>
</div>

<!-- FOOTER -->
<footer class="footer">
    <div class="container">
        <div class="social-icons">
            <a href="#"><i class="bi bi-instagram"></i></a>
            <a href="#"><i class="bi bi-facebook"></i></a>
            <a href="#"><i class="bi bi-youtube"></i></a>
            <a href="#"><i class="bi bi-tiktok"></i></a>
        </div>
        <div class="footer-links">
        </div>
        <p>© 2026 Nadila Ramadani - Selamat Hari Raya Idul Fitri</p>
    </div>
</footer>

<script>
// Filter Gallery Function
document.addEventListener('DOMContentLoaded', function() {
    const filterButtons = document.querySelectorAll('.filter-btn');
    const galleryCards = document.querySelectorAll('.card');
    
    filterButtons.forEach(button => {
        button.addEventListener('click', function() {
            // Remove active class from all buttons
            filterButtons.forEach(btn => btn.classList.remove('active'));
            // Add active class to clicked button
            this.classList.add('active');
            
            const filterValue = this.getAttribute('data-filter');
            
            galleryCards.forEach(card => {
                if (filterValue === 'all' || card.getAttribute('data-category') === filterValue) {
                    card.style.display = 'block';
                    card.style.animation = 'fadeInUp 0.5s ease';
                } else {
                    card.style.display = 'none';
                }
            });
        });
    });
});

// Lightbox Modal Function
const modal = document.getElementById('imageModal');
const modalImg = document.getElementById('modalImage');
const closeModal = document.querySelector('.close-modal');
const prevBtn = document.querySelector('.prev-btn');
const nextBtn = document.querySelector('.next-btn');

let currentImages = [];
let currentIndex = 0;

// Get all images from gallery
function updateCurrentImages() {
    const visibleCards = Array.from(document.querySelectorAll('.card')).filter(card => {
        return window.getComputedStyle(card).display !== 'none';
    });
    
    currentImages = visibleCards.map(card => {
        const img = card.querySelector('img');
        return {
            src: img.src,
            alt: img.alt
        };
    });
}

// Open modal with specific image
function openModal(index) {
    if (currentImages.length === 0) return;
    currentIndex = index;
    modalImg.src = currentImages[currentIndex].src;
    modal.style.display = 'block';
    document.body.style.overflow = 'hidden';
}

// Next image
function nextImage() {
    if (currentIndex < currentImages.length - 1) {
        currentIndex++;
        modalImg.src = currentImages[currentIndex].src;
    }
}

// Previous image
function prevImage() {
    if (currentIndex > 0) {
        currentIndex--;
        modalImg.src = currentImages[currentIndex].src;
    }
}

// Add click event to all cards
document.querySelectorAll('.card').forEach((card) => {
    card.addEventListener('click', function() {
        updateCurrentImages();
        const cardIndex = Array.from(document.querySelectorAll('.card'))
            .filter(c => window.getComputedStyle(c).display !== 'none')
            .indexOf(this);
        if (cardIndex !== -1) {
            openModal(cardIndex);
        }
    });
});

// Close modal
closeModal.onclick = function() {
    modal.style.display = 'none';
    document.body.style.overflow = 'auto';
}

// Next/Prev buttons
nextBtn.onclick = nextImage;
prevBtn.onclick = prevImage;

// Keyboard navigation
document.addEventListener('keydown', function(e) {
    if (modal.style.display === 'block') {
        if (e.key === 'ArrowRight') {
            nextImage();
        } else if (e.key === 'ArrowLeft') {
            prevImage();
        } else if (e.key === 'Escape') {
            modal.style.display = 'none';
            document.body.style.overflow = 'auto';
        }
    }
});

// Click outside modal to close
modal.onclick = function(e) {
    if (e.target === modal) {
        modal.style.display = 'none';
        document.body.style.overflow = 'auto';
    }
}
</script>

</body>
</html>
